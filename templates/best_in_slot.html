<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D2R: Reign of the Warlock — Best in Slot</title>
  <style>
    :root {
      --bg:       #0e0e12;
      --surface:  #16161e;
      --surface2: #1e1e2a;
      --border:   #2a2a3a;
      --text:     #d0d0d8;
      --muted:    #888898;
      --accent:   #c8a84b;
      --have:     #4ab04a;
      --unique:   #c89b3c;
      --set:      #4ab04a;
      --rare:     #c8c800;
      --magic:    #7878ff;
      --runeword: #d47a1e;
      --normal:   #c8c8c8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── Header ─────────────────────────────────────────── */
    .site-header {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 11px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .back-link { color: var(--accent); text-decoration: none; font-size: 13px; opacity: 0.75; white-space: nowrap; transition: opacity .15s; }
    .back-link:hover { opacity: 1; }
    .site-header h1 { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .rarity-legend { display: flex; gap: 7px; margin-left: auto; flex-wrap: wrap; align-items: center; }
    .rarity-legend span { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; border: 1px solid currentColor; }
    .leg-unique   { color: var(--unique); }
    .leg-set      { color: var(--set); }
    .leg-runeword { color: var(--runeword); }
    .leg-rare     { color: var(--rare); }
    .leg-magic    { color: var(--magic); }

    /* ── Class Selector ─────────────────────────────────── */
    .class-selector {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .class-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface2); color: var(--text); cursor: pointer; min-width: 86px;
      transition: border-color .15s, background .15s, color .15s;
    }
    .class-btn .cb-icon  { font-size: 20px; line-height: 1; }
    .class-btn .cb-name  { font-size: 12px; font-weight: 700; }
    .class-btn .cb-build { font-size: 9px; color: var(--muted); white-space: nowrap; }
    .class-btn:hover { border-color: var(--accent); }
    .class-btn.active { border-color: var(--accent); background: rgba(200,168,75,.1); color: var(--accent); }
    .class-btn.active .cb-build { color: rgba(200,168,75,.6); }

    /* ── Main 2-col layout ──────────────────────────────── */
    .bis-main { display: grid; grid-template-columns: 316px 1fr; min-height: calc(100vh - 108px); align-items: start; }

    /* ── Left column ────────────────────────────────────── */
    .char-col {
      padding: 16px 12px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      position: sticky; top: 0; max-height: 100vh; overflow-y: auto;
    }
    .build-info { text-align: center; width: 100%; }
    .build-info-sub  { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .build-info-name { font-size: 13px; font-weight: 700; color: var(--accent); margin-top: 3px; }

    /* Progress bar */
    .prog-wrap { width: 100%; display: none; }
    .prog-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 5px; }
    .prog-header .prog-n { color: var(--have); font-weight: 700; }
    .prog-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .prog-fill  { height: 100%; background: var(--have); border-radius: 2px; width: 0%; transition: width .4s ease; }

    /* Slot grid */
    .slot-grid-wrap { position: relative; width: 290px; }
    .char-silhouette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .slot-grid { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(3, 88px); gap: 7px; }

    .slot-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      gap: 2px; padding: 7px 4px 6px; min-height: 82px;
      border: 1px solid var(--border); border-radius: 8px;
      background: rgba(22,22,30,.9); color: var(--text);
      cursor: pointer; font-size: 11px; text-align: center;
      transition: border-color .15s, background .15s, box-shadow .15s;
      position: relative; overflow: hidden;
    }
    .slot-btn .s-icon    { font-size: 18px; line-height: 1.1; }
    .slot-btn .s-label   { font-size: 10px; font-weight: 700; letter-spacing: .3px; }
    .slot-btn .s-preview {
      font-size: 8.5px; max-width: 82px; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; line-height: 1.2;
      opacity: 0; transition: opacity .2s;
    }
    .slot-btn.previewed .s-preview { opacity: 1; }
    .slot-btn .s-have {
      position: absolute; top: 3px; right: 5px;
      font-size: 9px; color: var(--have); font-weight: 900; display: none;
    }
    .slot-btn.has-item .s-have    { display: block; }
    .slot-btn.has-item            { border-color: rgba(74,176,74,.35); }
    .slot-btn:hover               { border-color: var(--accent); background: rgba(200,168,75,.08); }
    .slot-btn.selected            { border-color: var(--accent); background: rgba(200,168,75,.15); box-shadow: 0 0 10px rgba(200,168,75,.2); color: var(--accent); }
    .slot-btn.selected .s-label  { color: var(--accent); }
    .slot-btn.empty-cell          { visibility: hidden; pointer-events: none; }

    /* ── Right: item panel ──────────────────────────────── */
    .item-panel { padding: 20px 24px; min-width: 0; }

    .panel-placeholder {
      display: flex; align-items: center; justify-content: center;
      min-height: 260px; color: var(--muted); font-size: 14px;
      border: 1px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center;
    }

    /* Panel animation */
    .panel-sec { display: none; }
    .panel-sec.visible { display: block; animation: fadeUp .18s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Overview panel ─────────────────────────────────── */
    .ov-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .ov-title  { font-size: 18px; font-weight: 700; color: var(--accent); }
    .collected-pill {
      font-size: 11px; color: var(--have); border: 1px solid var(--have);
      padding: 3px 10px; border-radius: 20px; background: rgba(74,176,74,.08); display: none;
    }
    .ov-list { display: flex; flex-direction: column; gap: 5px; }
    .ov-row {
      display: grid; grid-template-columns: 26px 62px 1fr auto;
      align-items: center; gap: 10px; padding: 9px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .ov-row:hover   { border-color: var(--accent); background: rgba(200,168,75,.05); }
    .ov-row.ov-has  { border-left: 3px solid var(--have); }
    .ov-icon { font-size: 16px; text-align: center; }
    .ov-slot { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 700; }
    .ov-item { font-size: 13px; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* Track button */
    .track-btn {
      padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 10px;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .track-btn:hover  { border-color: var(--have); color: var(--have); }
    .track-btn.tracked { border-color: var(--have); color: var(--have); background: rgba(74,176,74,.1); }

    /* ── Detail panel ───────────────────────────────────── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; color: var(--accent);
      font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 16px; opacity: .75; transition: opacity .15s;
    }
    .back-btn:hover { opacity: 1; }
    .slot-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 12px; }

    .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
    .item-card.bis-card { border-color: var(--accent); background: rgba(200,168,75,.04); }
    .item-card.alt-card { margin-bottom: 0; }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .bis-badge {
      display: inline-block; padding: 2px 7px; border-radius: 4px;
      background: var(--accent); color: #0e0e12; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .item-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .alt-card .item-name { font-size: 15px; }
    .item-type { font-size: 11px; color: var(--muted); margin-bottom: 11px; }
    .item-props { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .item-props li { font-size: 12px; color: var(--magic); padding-left: 13px; position: relative; }
    .item-props li::before { content: '•'; position: absolute; left: 0; color: var(--accent); }
    .alt-card .item-props li { font-size: 11px; }
    .alts-heading { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin: 16px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .alt-list { display: flex; flex-direction: column; gap: 8px; }

    /* Rarity colours */
    .rarity-unique   { color: var(--unique); }
    .rarity-set      { color: var(--set); }
    .rarity-rare     { color: var(--rare); }
    .rarity-magic    { color: var(--magic); }
    .rarity-runeword { color: var(--runeword); }
    .rarity-normal   { color: var(--normal); }

    /* Keyboard hint */
    .kbd-hint { font-size: 10px; color: var(--muted); opacity: .6; text-align: center; }
    .kbd-hint kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 4px; font-family: inherit; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 760px) {
      .bis-main { grid-template-columns: 1fr; }
      .char-col { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
      .slot-grid-wrap { width: 100%; }
      .slot-grid { grid-template-columns: repeat(3, 1fr); }
      .rarity-legend { display: none; }
    }
  </style>
</head>

// ─── Layout ───────────────────────────────────────────────────────────────────
const SLOT_LAYOUT = [
  [null,     'helm',   null   ],
  ['ring1',  'amulet', 'ring2'],
  ['weapon', 'armor',  'shield'],
  ['gloves', 'belt',   'boots']
];
// Display order for the overview list (top→bottom, anatomical)
const SLOT_ORDER = ['helm','amulet','armor','weapon','shield','gloves','belt','boots','ring1','ring2'];

const SLOT_INFO = {
  helm:   { label: 'Helm',    icon: '⛑️' },
  amulet: { label: 'Amulet',  icon: '📿' },
  armor:  { label: 'Armor',   icon: '🧥' },
  weapon: { label: 'Weapon',  icon: '⚔️' },
  shield: { label: 'Shield',  icon: '🛡️' },
  gloves: { label: 'Gloves',  icon: '🧤' },
  belt:   { label: 'Belt',    icon: '⚙️' },
  boots:  { label: 'Boots',   icon: '👢' },
  ring1:  { label: 'Ring 1',  icon: '💍' },
  ring2:  { label: 'Ring 2',  icon: '💍' }
};

// ─── State ────────────────────────────────────────────────────────────────────
let activeClass = null;
let activeSlot  = null;

// ─── localStorage tracking ────────────────────────────────────────────────────
const TKEY = 'd2r-bis';

function getTracking()          { try { return JSON.parse(localStorage.getItem(TKEY)) || {}; } catch { return {}; } }
function getTracked(cls, slot)  { const t = getTracking(); return (t[cls] && t[cls][slot]) || null; }

function setTracked(cls, slot, item) {
  const t = getTracking();
  if (!t[cls]) t[cls] = {};
  t[cls][slot] = item;
  localStorage.setItem(TKEY, JSON.stringify(t));
}

function clearTracked(cls, slot) {
  const t = getTracking();
  if (t[cls]) { delete t[cls][slot]; if (!Object.keys(t[cls]).length) delete t[cls]; }
  localStorage.setItem(TKEY, JSON.stringify(t));
}

function collectedCount(cls) {
  const t = getTracking();
  return Object.keys(t[cls] || {}).length;
}

// ─── URL hash ─────────────────────────────────────────────────────────────────
function readHash() {
  const parts = location.hash.replace('#', '').split('/');
  return { classKey: parts[0] || null, slotKey: parts[1] || null };
}

function writeHash(cls, slot) {
  const h = cls ? (slot ? `${cls}/${slot}` : cls) : '';
  history.replaceState(null, '', h ? `#${h}` : location.pathname + location.search);
}

// ─── Build static UI ─────────────────────────────────────────────────────────
function buildClassSelector() {
  const sel = document.getElementById('classSelector');
  Object.entries(BIS_DATA).forEach(([key, cls]) => {
    const btn = document.createElement('button');
    btn.className = 'class-btn';
    btn.dataset.class = key;
    btn.innerHTML = `<span class="cb-icon">${cls.icon}</span><span class="cb-name">${cls.name}</span><span class="cb-build">${cls.build}</span>`;
    btn.addEventListener('click', () => selectClass(key));
    sel.appendChild(btn);
  });
}

function buildSlotGrid() {
  const grid = document.getElementById('slotGrid');
  SLOT_LAYOUT.forEach(row => {
    row.forEach(slotKey => {
      const btn = document.createElement('button');
      if (!slotKey) {
        btn.className = 'slot-btn empty-cell';
        btn.setAttribute('aria-hidden', 'true');
        grid.appendChild(btn);
        return;
      }
      const info = SLOT_INFO[slotKey];
      btn.className = 'slot-btn';
      btn.dataset.slot = slotKey;
      btn.setAttribute('tabindex', '0');
      btn.innerHTML = `<span class="s-have">✓</span><span class="s-icon">${info.icon}</span><span class="s-label">${info.label}</span><span class="s-preview"></span>`;
      btn.addEventListener('click', () => selectSlot(slotKey));
      grid.appendChild(btn);
    });
  });
}

// ─── Update slot button previews & have-indicators ────────────────────────────
function updateSlotPreviews(cls) {
  document.querySelectorAll('.slot-btn[data-slot]').forEach(btn => {
    const slotKey  = btn.dataset.slot;
    const slotData = BIS_DATA[cls].slots[slotKey];
    const preview  = btn.querySelector('.s-preview');
    preview.textContent = slotData.bis.name;
    preview.className   = `s-preview rarity-${slotData.bis.rarity}`;
    btn.classList.add('previewed');
    btn.title = `BiS: ${slotData.bis.name} (${slotData.bis.rarity})`;
    btn.classList.toggle('has-item', !!getTracked(cls, slotKey));
  });
}

// ─── Progress bar ─────────────────────────────────────────────────────────────
function updateProgress(cls) {
  const count = collectedCount(cls);
  const total = SLOT_ORDER.length;
  document.getElementById('progCount').textContent = `${count} / ${total}`;
  document.getElementById('progFill').style.width  = `${(count / total) * 100}%`;
  document.getElementById('progWrap').style.display = 'block';

  const pill = document.getElementById('collectedPill');
  if (count > 0) {
    pill.textContent    = `${count} / ${total} collected`;
    pill.style.display  = 'inline-block';
  } else {
    pill.style.display  = 'none';
  }
}

// ─── Panel switcher ───────────────────────────────────────────────────────────
function showPanel(id) {
  ['overviewPanel', 'detailPanel'].forEach(p => {
    const el = document.getElementById(p);
    el.classList.remove('visible');
  });
  document.getElementById('panelPlaceholder').style.display = 'none';
  // rAF so removing+adding visible restarts the CSS animation
  requestAnimationFrame(() => document.getElementById(id).classList.add('visible'));
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function selectClass(cls, slot) {
  activeClass = cls;
  activeSlot  = null;

  document.querySelectorAll('.class-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.class === cls));

  const c = BIS_DATA[cls];
  document.getElementById('buildSub').textContent  = 'Selected Build';
  document.getElementById('buildName').textContent = `${c.icon} ${c.name} — ${c.build}`;

  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  updateSlotPreviews(cls);
  updateProgress(cls);
  showOverview(cls);

  if (slot && BIS_DATA[cls].slots[slot]) {
    selectSlot(slot);
    return;
  }
  writeHash(cls, null);
}

function selectSlot(slot) {
  if (!activeClass) return;
  activeSlot = slot;
  document.querySelectorAll('.slot-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.slot === slot));
  showDetail(activeClass, slot);
  writeHash(activeClass, slot);
}

function backToOverview() {
  activeSlot = null;
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  showOverview(activeClass);
  writeHash(activeClass, null);
}

// ─── Overview panel ───────────────────────────────────────────────────────────
function showOverview(cls) {
  const c = BIS_DATA[cls];
  document.getElementById('ovTitle').textContent = `${c.icon} ${c.name} — ${c.build}`;

  document.getElementById('ovList').innerHTML = SLOT_ORDER.map(slotKey => {
    const info     = SLOT_INFO[slotKey];
    const slotData = c.slots[slotKey];
    const tracked  = getTracked(cls, slotKey);
    const hasIt    = !!tracked;
    const allItems = [slotData.bis, ...slotData.alternatives];
    const dispItem    = hasIt ? tracked : slotData.bis.name;
    const dispRarity  = hasIt
      ? (allItems.find(i => i.name === tracked)?.rarity || 'normal')
      : slotData.bis.rarity;
    return `
      <div class="ov-row${hasIt ? ' ov-has' : ''}" data-slot="${slotKey}">
        <span class="ov-icon">${info.icon}</span>
        <span class="ov-slot">${info.label}</span>
        <span class="ov-item rarity-${dispRarity}">${dispItem}</span>
        <button class="track-btn${hasIt ? ' tracked' : ''}"
                data-class="${cls}" data-slot="${slotKey}"
                data-item="${hasIt ? tracked : slotData.bis.name}">
          ${hasIt ? '✓ Have' : '○ Need'}
        </button>
      </div>`;
  }).join('');

  updateProgress(cls);
  showPanel('overviewPanel');
}

// ─── Detail panel ─────────────────────────────────────────────────────────────
function showDetail(cls, slot) {
  const slotData = BIS_DATA[cls].slots[slot];
  document.getElementById('slotTitle').textContent = SLOT_INFO[slot].label;
  document.getElementById('bisContainer').innerHTML  = itemCardHTML(slotData.bis, cls, slot, true);
  document.getElementById('altContainer').innerHTML  = slotData.alternatives.map(it => itemCardHTML(it, cls, slot, false)).join('');
  showPanel('detailPanel');
}

function itemCardHTML(item, cls, slot, isBis) {
  const tracked   = getTracked(cls, slot);
  const isTracked = tracked === item.name;
  const props = item.props.length
    ? `<ul class="item-props">${item.props.map(p => `<li>${p}</li>`).join('')}</ul>`
    : '';
  return `
    <div class="item-card ${isBis ? 'bis-card' : 'alt-card'}">
      <div class="card-top">
        ${isBis ? '<span class="bis-badge">Best in Slot</span>' : '<span></span>'}
        <button class="track-btn${isTracked ? ' tracked' : ''}"
                data-class="${cls}" data-slot="${slot}" data-item="${item.name}">
          ${isTracked ? '✓ Have' : '○ Need'}
        </button>
      </div>
      <div class="item-name rarity-${item.rarity}">${item.name}</div>
      <div class="item-type">${item.type}</div>
      ${props}
    </div>`;
}

// ─── Track toggle (surgical DOM update — no full re-render) ───────────────────
function toggleItem(cls, slot, itemName) {
  const current = getTracked(cls, slot);
  if (current === itemName) clearTracked(cls, slot);
  else                      setTracked(cls, slot, itemName);

  const tracked   = getTracked(cls, slot);  // re-read after mutation
  const hasIt     = !!tracked;
  const slotData  = BIS_DATA[cls].slots[slot];
  const allItems  = [slotData.bis, ...slotData.alternatives];

  // 1. Update every track-btn for this slot in the DOM
  document.querySelectorAll(`.track-btn[data-class="${cls}"][data-slot="${slot}"]`).forEach(btn => {
    const isThis = tracked === btn.dataset.item;
    btn.classList.toggle('tracked', isThis);
    btn.textContent = isThis ? '✓ Have' : '○ Need';
  });

  // 2. Update the overview row (item text + border + track-btn data-item)
  const row = document.querySelector(`.ov-row[data-slot="${slot}"]`);
  if (row) {
    row.classList.toggle('ov-has', hasIt);
    const itemSpan = row.querySelector('.ov-item');
    if (itemSpan) {
      const dispName   = hasIt ? tracked : slotData.bis.name;
      const dispRarity = hasIt ? (allItems.find(i => i.name === tracked)?.rarity || 'normal') : slotData.bis.rarity;
      itemSpan.textContent = dispName;
      itemSpan.className   = `ov-item rarity-${dispRarity}`;
    }
    // Keep overview track btn pointing to the right item for next click
    const ovBtn = row.querySelector('.track-btn');
    if (ovBtn) ovBtn.dataset.item = hasIt ? tracked : slotData.bis.name;
  }

  // 3. Slot diagram have-indicator
  const slotBtn = document.querySelector(`.slot-btn[data-slot="${slot}"]`);
  if (slotBtn) slotBtn.classList.toggle('has-item', hasIt);

  // 4. Progress
  updateProgress(cls);
}

// ─── Event delegation ─────────────────────────────────────────────────────────
function setupEvents() {
  // Overview: track-btn clicks + row clicks → slot detail
  document.getElementById('overviewPanel').addEventListener('click', e => {
    const tBtn = e.target.closest('.track-btn');
    if (tBtn) { e.stopPropagation(); toggleItem(tBtn.dataset.class, tBtn.dataset.slot, tBtn.dataset.item); return; }
    const row = e.target.closest('.ov-row');
    if (row) selectSlot(row.dataset.slot);
  });

  // Detail: track-btn clicks
  document.getElementById('detailPanel').addEventListener('click', e => {
    const tBtn = e.target.closest('.track-btn');
    if (tBtn) toggleItem(tBtn.dataset.class, tBtn.dataset.slot, tBtn.dataset.item);
  });

  // Back button
  document.getElementById('backBtn').addEventListener('click', backToOverview);
}

// ─── Keyboard navigation ─────────────────────────────────────────────────────
function setupKeyboard() {
  const flat = SLOT_LAYOUT.flat(); // 12 cells, some null
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && activeSlot) { backToOverview(); return; }
    if (!['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key)) return;
    const focused = document.activeElement;
    if (!focused?.classList.contains('slot-btn') || !focused.dataset.slot) return;
    e.preventDefault();
    const idx   = flat.indexOf(focused.dataset.slot);
    const delta = { ArrowRight: 1, ArrowLeft: -1, ArrowDown: 3, ArrowUp: -3 }[e.key];
    let next = idx + delta;
    // Skip null cells (up to 2 steps)
    for (let i = 0; i < 2 && next >= 0 && next < flat.length && flat[next] === null; i++)
      next += delta > 0 ? 1 : -1;
    if (next < 0 || next >= flat.length || !flat[next]) return;
    document.querySelector(`.slot-btn[data-slot="${flat[next]}"]`)?.focus();
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  buildClassSelector();
  buildSlotGrid();
  setupEvents();
  setupKeyboard();

  const { classKey, slotKey } = readHash();
  if (classKey && BIS_DATA[classKey]) {
    selectClass(classKey, slotKey && BIS_DATA[classKey].slots[slotKey] ? slotKey : null);
  }

  window.addEventListener('hashchange', () => {
    const { classKey: c, slotKey: s } = readHash();
    if (c && BIS_DATA[c]) {
      selectClass(c, s && BIS_DATA[c].slots[s] ? s : null);
    }
  });
}

init();
</script>
